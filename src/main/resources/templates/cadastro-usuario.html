<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="/produtos">FATEC - Gerenciador de Catálogo</a>
  </div>
</nav>

<div class="container">
  <div class="card shadow">

    <div class="card-header bg-white d-flex justify-content-between align-items-center">
      <h2 class="mb-0">Cadastro de Usuário</h2>
      <a href="/produtos" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Voltar
      </a>
    </div>

    <div class="card-body">

      <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
      <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

      <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post" novalidate>

        <div class="mb-3">
          <label for="username" class="form-label">Usuário</label>
          <input type="text" id="username" th:field="*{username}"
                 class="form-control"
                 th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                 placeholder="Digite o usuário" required/>
          <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}"
               th:errors="*{username}"></div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Senha</label>
          <div class="input-group">
            <input type="password" id="password" th:field="*{password}"
                   class="form-control"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                   placeholder="Digite a senha" required/>
            <button class="btn btn-outline-secondary" type="button" onclick="toggleSenha()">
              <i class="bi bi-eye" id="iconeSenha"></i>
            </button>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                 th:errors="*{password}"></div>
          </div>
        </div>

        <div class="mb-3">
          <label for="role" class="form-label">Perfil</label>
          <select id="role" th:field="*{role}" class="form-select"
                  th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'" required>
            <option value="">Selecione...</option>
            <option value="USER">USER</option>
            <option value="ADMIN">ADMIN</option>
          </select>
          <div class="invalid-feedback" th:if="${#fields.hasErrors('role')}"
               th:errors="*{role}"></div>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-success">Cadastrar</button>
        </div>

      </form>
    </div>
  </div>
</div>

<script>
  function toggleSenha() {
      const input = document.getElementById('password');
      const icone = document.getElementById('iconeSenha');
      if (input.type === 'password') {
          input.type = 'text';
          icone.classList.replace('bi-eye', 'bi-eye-slash');
      } else {
          input.type = 'password';
          icone.classList.replace('bi-eye-slash', 'bi-eye');
      }
  }
</script>

</body>
</html>
