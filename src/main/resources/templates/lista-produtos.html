<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/produtos">FATEC - Gerenciador de Catálogo</a>
        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-box-arrow-right"></i> Sair
            </button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="card shadow">

        <!-- ✅ Um único card-header com título, botão e busca -->
        <div class="card-header bg-white">
            <div class="d-flex justify-content-between align-items-center mb-3" sec:authorize="hasRole('ADMIN')">
                <h2 class="mb-0">Lista de Produtos</h2>
                <div class="d-flex gap-2">
                    <a th:href="@{/categorias/novo}" class="btn btn-outline-primary">
                        Cadastrar Categoria
                    </a>
                    <a href="/usuarios/novo" class="btn btn-outline-primary">Cadastrar Usuário</a>
                    <a href="/produtos/novo" class="btn btn-success">Novo Produto</a>
                </div>
            </div>
            <form th:action="@{/produtos}" method="get">
                <div class="input-group">
                    <input type="text"
                           name="nome"
                           class="form-control"
                           placeholder="Buscar produto pelo nome..."
                           th:value="${nome}"/>
                    <button class="btn btn-primary" type="submit">Buscar</button>
                    <a href="/produtos" class="btn btn-outline-secondary">Limpar</a>
                </div>
            </form>
        </div>

        <div class="card-body">
            <table class="table table-hover text-center">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome do Produto</th>
                    <th>Valor</th>
                    <th>Data de Cadastro</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${produtos}">
                    <td class="text-muted" th:text="${p.idProduto}"></td>
                    <td class="text-muted" th:text="${p.nome}"></td>
                    <td th:classappend="${p.valor > 100} ? 'text-danger' : 'text-muted'">
                        R$ <span th:text="${p.valor}"></span>
                    </td>
                    <td class="text-muted" th:text="${#temporals.format(p.dataCadastro, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <a class="btn btn-sm btn-warning"
                           th:href="@{/produtos/editar/{id}(id=${p.idProduto})}">Editar</a>
                        <a class="btn btn-sm btn-danger"
                           th:href="@{/produtos/excluir/{id}(id=${p.idProduto})}"
                           onclick="return confirm('Quer mesmo excluir??')">Remover</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
