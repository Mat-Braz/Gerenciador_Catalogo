<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        /* Estilização para o link de usuário no menu */
        .nav-link-user {
            color: #e0e0e0 !important;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-link-user:hover {
            color: #ffffff !important;
        }
    </style>
</head>

<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <a class="navbar-brand me-3" href="/produtos">FATEC - Gerenciador de Catálogo</a>
            <!-- ✅ Usuário ao lado do título, cinza claro e menor -->
            <a href="/usuarios/novo" sec:authorize="hasRole('ADMIN')" class="nav-link-user">
                Cadastrar Usuário
            </a>
        </div>

        <form th:action="@{/logout}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-box-arrow-right"></i> Sair
            </button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="card shadow">
        <div class="card-header bg-white">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="mb-0">Lista de Produtos</h2>
                <div class="d-flex gap-2" sec:authorize="hasRole('ADMIN')">
                    <!-- ✅ Cadastrar Categoria com mesma formatação de Novo Produto -->
                    <a th:href="@{/categorias/novo}" class="btn btn-success">
                        Cadastrar Categoria
                    </a>
                    <a href="/produtos/novo" class="btn btn-success">Novo Produto</a>
                </div>
            </div>

            <!-- ✅ Busca com ícone, filtro de categoria e botões com espaçamento -->
            <form th:action="@{/produtos}" method="get">
                <div class="row g-3 align-items-center">
                    <div class="col-md-4">
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" name="nome" class="form-control"
                                   placeholder="Buscar produto pelo nome..." th:value="${nome}"/>
                        </div>
                    </div>

                    <!-- ✅ Menu de filtro por categoria -->
                    <div class="col-md-3">
                        <select name="categoriaId" class="form-select">
                            <option value="">Todas as Categorias</option>
                            <option th:each="cat : ${categorias}"
                                    th:value="${cat.idCategoria}"
                                    th:text="${cat.nome}"
                                    th:selected="${cat.idCategoria == param.categoriaId}">
                            </option>
                        </select>
                    </div>

                    <div class="col-auto d-flex gap-2">
                        <button class="btn btn-primary" type="submit">Buscar</button>

                        <!-- ✅ Botão Limpar aparece apenas se houver algo digitado -->
                        <a href="/produtos" class="btn btn-outline-secondary"
                           th:if="${nome != null and !nome.isEmpty()}">Limpar</a>
                    </div>
                </div>
            </form>
        </div>

        <div class="card-body">
            <table class="table table-hover text-center">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome do Produto</th>
                    <!-- ✅ Coluna Categoria após Nome -->
                    <th>Categoria</th>
                    <th>Valor</th>
                    <th>Data de Cadastro</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${produtos}">
                    <td class="text-muted" th:text="${p.idProduto}"></td>
                    <td class="text-muted" th:text="${p.nome}"></td>
                    <!-- ✅ Exibição da Categoria -->
                    <td class="text-muted" th:text="${p.categoria != null ? p.categoria.nome : 'Sem Categoria'}"></td>
                    <td th:classappend="${p.valor > 100} ? 'text-danger' : 'text-muted'">
                        R$ <span th:text="${p.valor}"></span>
                    </td>
                    <td class="text-muted" th:text="${#temporals.format(p.dataCadastro, 'dd/MM/yyyy HH:mm')}"></td>
                    <td>
                        <a class="btn btn-sm btn-warning" th:href="@{/produtos/editar/{id}(id=${p.idProduto})}">Editar</a>
                        <a class="btn btn-sm btn-danger" th:href="@{/produtos/excluir/{id}(id=${p.idProduto})}"
                           onclick="return confirm('Quer mesmo excluir??')">Remover</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
