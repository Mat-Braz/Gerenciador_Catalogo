<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Categoria</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/categorias">
            FATEC - CATÁLOGO
        </a>
    </div>
</nav>

<!-- Conteúdo -->
<div class="container d-flex justify-content-center mt-5">
    <div class="card shadow-sm w-100" style="max-width: 450px;">

        <div class="card-header bg-primary text-white">
            <h5 class="mb-0 text-uppercase">Nova Categoria</h5>
        </div>

        <div class="card-body">

            <!-- Mensagem geral -->
            <div th:if="${sucesso}" class="alert alert-success">
                <span th:text="${sucesso}"></span>
            </div>

            <!-- Formulário -->
            <form th:action="@{/categorias/salvar}"
                  th:object="${categoria}"
                  method="post">

                <!-- Nome -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nome da Categoria</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{nome}"
                           placeholder="Digite o nome da categoria">

                    <!-- Erro do campo -->
                    <div class="text-danger mt-1"
                         th:if="${#fields.hasErrors('nome')}"
                         th:errors="*{nome}">
                    </div>
                </div>

                <!-- Botões -->
                <div class="d-flex justify-content-between mt-4">

                    <!-- Botão voltar -->
                    <a th:href="@{/produtos}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Voltar
                    </a>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success">
                            Salvar Categoria
                        </button>
                    </div>

                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
