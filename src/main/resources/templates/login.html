<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Catálogo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">
<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/produtos">FATEC - Gerenciador de Catálogo</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">

                <div class="card-header bg-white">
                    <h2 class="mb-0">Login</h2>
                </div>

                <div class="card-body">

                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                        Usuário ou senha inválidos.
                    </div>

                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                        Logout realizado com sucesso.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <div class="mb-3">
                            <label for="username" class="form-label">Usuário</label>
                            <input type="text" id="username" name="username"
                                   class="form-control" placeholder="Digite seu usuário" required autofocus/>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Senha</label>
                            <div class="input-group">
                                <input type="password" id="password" name="password"
                                       class="form-control" placeholder="Digite sua senha" required/>
                                <button class="btn btn-outline-secondary" type="button" onclick="toggleSenha()">
                                    <i class="bi bi-eye" id="iconeSenha"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Entrar</button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
<script>
    function toggleSenha() {
        const input = document.getElementById('password');
        const icone = document.getElementById('iconeSenha');
        if (input.type === 'password') {
            input.type = 'text';
            icone.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = 'password';
            icone.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }
</script>
</body>
</html>
